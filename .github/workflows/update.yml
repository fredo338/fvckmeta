name: Update Posts

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # 1️⃣ Check out your repo
      - uses: actions/checkout@v3

      # 2️⃣ Copy the session file into a place Instaloader can find it
      - name: Copy session file
        run: cp session-bat.8797744 $HOME/

      # 3️⃣ Set up Python
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.14

      # 4️⃣ Install requirements
      - name: Install Python packages
        run: pip install instaloader

      # 5️⃣ Run your fetch.py using the session file
      - name: Fetch Instagram posts
        run: python fetch.py
        env:
          SESSION_PATH: $HOME/session-bat.8797744
