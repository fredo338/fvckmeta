name: Update Posts

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # 1️⃣ Check out repo
      - uses: actions/checkout@v3

      # 2️⃣ Check if session file exists, and if not, copy it
      - name: Ensure session file is in the root
        run: |
          if [ ! -f "$GITHUB_WORKSPACE/session-bat.8797744" ]; then
            cp session-bat.8797744 $GITHUB_WORKSPACE/session-bat.8797744
          else
            echo "Session file already exists in the root."
          fi

      # 3️⃣ Setup Python
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.14

      # 4️⃣ Install Instaloader
      - name: Install Instaloader
        run: pip install instaloader

      # 5️⃣ Run fetch.py
      - name: Fetch Instagram posts
        run: python fetch.py
